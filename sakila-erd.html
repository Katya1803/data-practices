<script>
var scale=0.82,tx=0,ty=0;
var wrap=document.getElementById('svg-wrap');
var cont=document.getElementById('container');
var zlbl=document.getElementById('zlbl');
function apply(){wrap.style.transform='translate('+tx+'px,'+ty+'px) scale('+scale+')';zlbl.textContent=Math.round(scale*100)+'%';}
function doZoom(d,ox,oy){
  var nr=Math.min(3,Math.max(0.2,scale+d));
  if(ox===undefined){ox=cont.clientWidth/2;oy=cont.clientHeight/2;}
  tx=ox-(ox-tx)*(nr/scale);ty=oy-(oy-ty)*(nr/scale);scale=nr;apply();
}
function reset(){scale=0.82;tx=0;ty=0;apply();}
cont.addEventListener('wheel',function(e){e.preventDefault();var r=cont.getBoundingClientRect();doZoom(-e.deltaY*0.001,e.clientX-r.left,e.clientY-r.top);},{passive:false});
var drag=null;
cont.addEventListener('mousedown',function(e){drag={x:e.clientX-tx,y:e.clientY-ty};cont.classList.add('dragging');});
window.addEventListener('mousemove',function(e){if(!drag)return;tx=e.clientX-drag.x;ty=e.clientY-drag.y;apply();});
window.addEventListener('mouseup',function(){drag=null;cont.classList.remove('dragging');});
apply();
</script>
